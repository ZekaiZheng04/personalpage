<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing | Zheng Zekai</title>
    <meta name="description" content="Literary directory and poems by Zheng Zekai.">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Writing Directory Styles */
        .writing-list {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            margin-top: 2rem;
        }

        .writing-item {
            border-bottom: 1px dashed var(--border);
            padding-bottom: 1.5rem;
            transition: var(--transition-fast);
        }

        .writing-item:last-child {
            border-bottom: none;
        }

        .writing-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .writing-date {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .writing-category {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background-color: var(--accent-light);
            padding: 0.1rem 0.4rem;
            border-radius: var(--radius-sm);
        }

        .writing-title-link {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            display: inline-block;
            margin-bottom: 0.75rem;
        }

        .writing-title-link:hover {
            color: var(--accent);
        }

        .writing-excerpt {
            font-family: var(--font-serif);
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header id="header">
        <div class="container nav-container">
            <a href="index.html" class="logo" id="logo">Z</a>

            <nav>
                <ul class="nav-links" id="nav-links">
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="writing.html" class="active-nav">Writing</a></li>
                    <li>
                        <a href="movie.html" id="nav-movie-link" aria-label="Today's Movie" class="nav-icon-link">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 7l-7 5 7 5V7z"></path>
                                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                            </svg>
                        </a>
                    </li>
                    <li>
                        <a href="music.html" id="nav-music-link" aria-label="Today's Music" class="nav-icon-link">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 18V5l12-2v13"></path>
                                <circle cx="6" cy="18" r="3"></circle>
                                <circle cx="18" cy="16" r="3"></circle>
                            </svg>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="nav-meta">
                <div class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main style="padding-top: 7.5rem; padding-bottom: 5rem;">
        <div class="container">

            <!-- Page Title -->
            <div style="margin-bottom: 3rem;">
                <h1
                    style="font-family: var(--font-mono); font-size: 1.5rem; font-weight: 700; color: var(--accent); letter-spacing: 0.05em;">
                    /WRITING</h1>
            </div>

            <!-- Writing List Directory -->
            <div class="writing-list">
                <!-- Dynamically populated by app.js -->
            </div>

            <!-- Back to Home Link -->
            <div style="margin-top: 5rem; border-top: 1px solid var(--border); padding-top: 2rem;">
                <a href="index.html" class="mono"
                    style="font-size: 0.85rem; font-weight: 600; color: var(--accent); display: inline-flex; align-items: center; gap: 0.5rem; transition: var(--transition-fast);">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to Home
                </a>
            </div>

        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="container footer-container">
            <div class="footer-text">
                &ldquo;Chasing internity in a short life.&rdquo;
            </div>
            <div class="footer-tech">
                <span>Archived in Cream & Sepia Minimalist</span>
            </div>
        </div>
    </footer>

    <!-- App Script -->
    <script src="app.js"></script>
</body>

</html>
