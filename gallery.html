<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Zheng Zekai</title>
    <meta name="description" content="Personal photography collection of Zheng Zekai, sorted by sub-albums.">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Unique local styles for gallery grid spacing */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 2rem;
        }

        .album-card {
            cursor: pointer;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: var(--transition-normal);
        }

        .album-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(45, 40, 36, 0.05);
        }

        .album-cover-wrapper {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background-color: #f0ebe2;
            position: relative;
        }

        .album-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .album-card:hover .album-cover {
            transform: scale(1.05);
        }

        .album-title-bar {
            padding: 1.25rem;
            text-align: center;
        }

        .album-title-text {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Photo Grid inside an opened album */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .photo-item {
            cursor: pointer;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border);
            height: 180px;
            background-color: #f0ebe2;
            transition: var(--transition-normal);
        }

        .photo-item:hover {
            transform: scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 8px 20px rgba(45, 40, 36, 0.08);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Lightbox Fullscreen Overlay */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(43, 40, 36, 0.85);
            /* Warm dark backdrop */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .lightbox-content-wrapper {
            position: relative;
            max-width: 85%;
            max-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: var(--radius-md);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Navigation Icons */
        .lightbox-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(254, 254, 251, 0.1);
            color: #ffffff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-fast);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lightbox-btn:hover {
            background-color: rgba(254, 254, 251, 0.25);
            color: #ffffff;
        }

        .lightbox-prev {
            left: -80px;
        }

        .lightbox-next {
            right: -80px;
        }

        .lightbox-close {
            position: absolute;
            top: -50px;
            right: 0;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .lightbox-close:hover {
            color: #ffffff;
        }

        @media (max-width: 768px) {

            .gallery-grid,
            .photo-grid {
                grid-template-columns: 1fr;
            }

            .lightbox-prev {
                left: 10px;
            }

            .lightbox-next {
                right: 10px;
            }

            .lightbox-btn {
                background-color: rgba(254, 254, 251, 0.3);
            }

            .lightbox-close {
                top: 15px;
                right: 15px;
                color: #ffffff;
                z-index: 1010;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header id="header">
        <div class="container nav-container">
            <a href="index.html" class="logo" id="logo">Z</a>

            <nav>
                <ul class="nav-links" id="nav-links">
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="gallery.html" class="active-nav">Gallery</a></li>
                    <li><a href="writing.html">Writing</a></li>
                    <li>
                        <a href="movie.html" id="nav-movie-link" aria-label="Today's Movie" class="nav-icon-link">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 7l-7 5 7 5V7z"></path>
                                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                            </svg>
                        </a>
                    </li>
                    <li>
                        <a href="music.html" id="nav-music-link" aria-label="Today's Music" class="nav-icon-link">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 18V5l12-2v13"></path>
                                <circle cx="6" cy="18" r="3"></circle>
                                <circle cx="18" cy="16" r="3"></circle>
                            </svg>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="nav-meta">
                <div class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main style="padding-top: 7.5rem; padding-bottom: 5rem;">
        <div class="container">

            <!-- Dynamic Category Tag / Breadcrumb -->
            <div style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: center;">
                <h1 id="gallery-page-title"
                    style="font-family: var(--font-mono); font-size: 1.5rem; font-weight: 700; color: var(--accent); letter-spacing: 0.05em;">
                    /GALLERY
                </h1>
                <!-- Back to albums button (hidden initially) -->
                <button id="btn-back-to-albums" class="mono"
                    style="display: none; font-size: 0.8rem; font-weight: 600; color: var(--accent-secondary); align-items: center; gap: 0.4rem; cursor: pointer;">
                    &larr; Back to Albums
                </button>
            </div>

            <!-- VIEW 1: ALBUMS DIRECTORY (Visible by default) -->
            <div id="album-directory-view">
                <div class="gallery-grid">
                    <!-- Dynamically populated by app.js -->
                </div>
            </div>

            <!-- VIEW 2: ALBUM PHOTOS INNER GRID (Initially Hidden) -->
            <div id="album-photos-view" style="display: none;">
                <div class="photo-grid" id="album-photo-grid">
                    <!-- JavaScript dynamically populates photo items here -->
                </div>
            </div>

            <!-- Back to Home Link -->
            <div style="margin-top: 5rem; border-top: 1px solid var(--border); padding-top: 2rem;">
                <a href="index.html" class="mono"
                    style="font-size: 0.85rem; font-weight: 600; color: var(--accent); display: inline-flex; align-items: center; gap: 0.5rem; transition: var(--transition-fast);">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to Home
                </a>
            </div>

        </div>
    </main>

    <!-- LIGHTBOX OVERLAY WIDGET -->
    <div class="lightbox" id="lightbox-overlay">
        <!-- Close button -->
        <span class="lightbox-close" id="lightbox-close-btn">&times;</span>

        <div class="lightbox-content-wrapper">
            <!-- Navigation Buttons -->
            <button class="lightbox-btn lightbox-prev" id="lightbox-prev-btn"
                aria-label="Previous Photo">&lsaquo;</button>

            <!-- Active Image -->
            <img src="" alt="Enlarged View" class="lightbox-img" id="lightbox-active-img">

            <button class="lightbox-btn lightbox-next" id="lightbox-next-btn" aria-label="Next Photo">&rsaquo;</button>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div class="container footer-container">
            <div class="footer-text">
                &ldquo;Chasing internity in a short life.&rdquo;
            </div>
            <div class="footer-tech">
                <span>Archived in Cream & Sepia Minimalist</span>
            </div>
        </div>
    </footer>

    <!-- App Script -->
    <script src="app.js"></script>
</body>

</html>
